apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: role-playingvideogame
  namespace: argocd
spec:
  description: role-playingvideogame application managed from the application repository
  sourceRepos:
    - https://github.com/gateszhangc/role-playingvideogame.git
  destinations:
    - namespace: role-playingvideogame
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
