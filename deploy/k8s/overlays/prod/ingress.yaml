apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: role-playingvideogame
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    cert-manager.io/issuer: letsencrypt-dns-prod
    cert-manager.io/issue-temporary-certificate: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - secretName: role-playingvideogame-live-tls
      hosts:
        - role-playingvideogame.lol
        - www.role-playingvideogame.lol
  rules:
    - host: role-playingvideogame.lol
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: role-playingvideogame
                port:
                  number: 80
    - host: www.role-playingvideogame.lol
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: role-playingvideogame
                port:
                  number: 80
