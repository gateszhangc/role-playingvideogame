apiVersion: apps/v1
kind: Deployment
metadata:
  name: role-playingvideogame
  labels:
    app.kubernetes.io/name: role-playingvideogame
    app.kubernetes.io/part-of: role-playingvideogame
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: role-playingvideogame
      app.kubernetes.io/part-of: role-playingvideogame
  template:
    metadata:
      labels:
        app.kubernetes.io/name: role-playingvideogame
        app.kubernetes.io/part-of: role-playingvideogame
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      imagePullSecrets:
        - name: dokploy-fleet-ghcr
      containers:
        - name: web
          image: registry.144.91.77.245.sslip.io/role-playingvideogame:bootstrap
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: 0.0.0.0
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            initialDelaySeconds: 5
            periodSeconds: 10
            tcpSocket:
              port: 3000
          livenessProbe:
            initialDelaySeconds: 15
            periodSeconds: 20
            tcpSocket:
              port: 3000
          startupProbe:
            failureThreshold: 30
            periodSeconds: 5
            tcpSocket:
              port: 3000
